<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Entreprise_index</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ff9800">

<style>
body { margin:0; font-family:Arial; background:#fff; }
.header { display:flex; justify-content:space-between; padding:15px; font-weight:bold; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; padding:15px; }
.card { height:90px; border-radius:12px; display:flex; justify-content:center; align-items:center; color:#fff; cursor:pointer; }
.c1{background:#ff9800;} .c2{background:#000;} .c3{background:#f57c00;}
.footer { position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; }
</style>
</head>

<body>

<div class="header">Choisire votre crémerie</div>

<div class="grid" id="grid">

    <div class="card c1" onclick="selectShop('Cremerie 1')">Crémerie 1</div>
    <div class="card c2" onclick="selectShop('Cremerie 2')">Crémerie 2</div>
    <div class="card c3" onclick="selectShop('Cremerie 3')">Crémerie 3</div>

</div>

<div class="footer">
    <div onclick="goHome()">🏠</div>
    <div onclick="openCart()">🛒</div>
</div>

<script>
function selectShop(shop) {
    localStorage.setItem("shop", shop);
    window.location.href = "product_index.html";
}

function goHome() {
    window.location.href = "category index.html";
}

function openCart() {
    window.location.href = "cart_index.html";
}

window.onload = function() {
    const category = localStorage.getItem("category");

    if (category !== "drinks") {
        document.getElementById("grid").innerHTML = `
            <div style="grid-column: span 3; text-align:center;">
                No shops for this category 🚫
            </div>
        `;
    }
};
</script>

</body>
</html>
