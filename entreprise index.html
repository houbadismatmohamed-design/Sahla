<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Entreprise</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:15px;}
.card{height:90px;border-radius:12px;display:flex;justify-content:center;align-items:center;color:#fff;cursor:pointer;}
.c1{background:#ff9800;} .c2{background:#000;} .c3{background:#f57c00;}
</style>
</head>

<body>

<h2 style="text-align:center">Choisire votre crémerie</h2>

<div class="grid" id="grid">
<div class="card c1" onclick="selectShop('Cremerie 1')">Crémerie 1</div>
<div class="card c2" onclick="selectShop('Cremerie 2')">Crémerie 2</div>
<div class="card c3" onclick="selectShop('Cremerie 3')">Crémerie 3</div>
</div>

<script>
function selectShop(shop){
    localStorage.setItem("shop",shop);
    window.location.href="product_index.html";
}

window.onload=function(){
    const cat=localStorage.getItem("category");
    if(cat!=="drinks"){
        document.getElementById("grid").innerHTML="<p>No shops here 🚫</p>";
    }
}
</script>

</body>
</html>
