<meta name="theme-color" content="#ff9800">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
}

/* ✅ NEW HEADER STYLE */
.header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
}

/* EXISTING HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    color: #000;
}

.wilaya-btn {
    padding: 8px 12px;
    border: none;
    background: #ff9800;
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
}

.wilaya-select {
    display: none;
    margin-left: 10px;
    padding: 6px;
    border-radius: 6px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 15px;
    padding-bottom: 80px;
}

.card {
    height: 90px;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    font-weight: bold;
    text-align: center;
    cursor: pointer;
}

.c1 { background: #ff9800; }
.c2 { background: #000; }
.c3 { background: #f57c00; }
.c4 { background: #ffb74d; color:#000;}
.c5 { background: #212121; }
.c6 { background: #ffa726; color:#000;}
.c7 { background: #fb8c00; }
.c8 { background: #424242; }
.c9 { background: #ffcc80; color:#000; }

.footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 60px;
    background: #fff;
    border-top: 1px solid #ddd;
    display: flex;
    justify-content: space-around;
    align-items: center;
}

.nav-btn {
    text-align: center;
    font-size: 14px;
    cursor: pointer;
    color: #000;
}
</style>
</head>
