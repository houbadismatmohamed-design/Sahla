<script>
function toggleWilaya() {
    const select = document.getElementById("wilayaSelect");
    select.style.display = select.style.display === "block" ? "none" : "block";
}

function selectWilaya() {
    const value = document.getElementById("wilayaSelect").value;
    localStorage.setItem("wilaya", value);
    console.log("Wilaya saved:", value);
}

/* ✅ NEW: SAVE SHOP */
function selectShop(shop) {
    localStorage.setItem("shop", shop);
    window.location.href = "product_index.html";
}

function goHome() {
    window.location.href = "category index.html";
}

function openCart() {
    window.location.href = "cart_index.html";
}

function logout() {
    localStorage.removeItem("token");
    window.location.href = "index.html";
}

window.onload = function() {
    const saved = localStorage.getItem("wilaya");

    if (saved !== null) {
        document.getElementById("wilayaSelect").value = saved;
    }
};
</script>
