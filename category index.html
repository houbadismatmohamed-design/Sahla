<!DOCTYPE html>

<head>

<title>Categories</title>

<!-- ✅ MOBILE + PWA -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ff9800">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    color: #000;
}

/* Wilaya Button */
.wilaya-btn {
    padding: 8px 12px;
    border: none;
    background: #ff9800;
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
}

/* ✅ NEW: Wilaya Select */
.wilaya-select {
    display: none;
    margin-left: 10px;
    padding: 6px;
    border-radius: 6px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 15px;
    padding-bottom: 80px;
}

/* CATEGORY CARD */
.card {
    height: 90px;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    font-weight: bold;
    text-align: center;
}

/* COLORS */
.c1 { background: #ff9800; }
.c2 { background: #000; }
.c3 { background: #f57c00; }
.c4 { background: #ffb74d; color:#000;}
.c5 { background: #212121; }
.c6 { background: #ffa726; color:#000;}
.c7 { background: #fb8c00; }
.c8 { background: #424242; }
.c9 { background: #ffcc80; color:#000; }

/* FOOTER */
.footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 60px;
    background: #fff;
    border-top: 1px solid #ddd;
    display: flex;
    justify-content: space-around;
    align-items: center;
}

/* FOOTER BUTTON */
.nav-btn {
    text-align: center;
    font-size: 14px;
    cursor: pointer;
    color: #000;
}

/* RESPONSIVE */
@media (max-width: 400px) {
    .card {
        height: 80px;
        font-size: 12px;
    }
}
</style>
</head>

<script>
function toggleWilaya() {
    const select = document.getElementById("wilayaSelect");
    select.style.display = select.style.display === "block" ? "none" : "block";
}

/* ✅ UPDATED: NO ALERTS, ONLY SAVE */
function selectWilaya() {
    const value = document.getElementById("wilayaSelect").value;

    // Save permanently until user changes it
    localStorage.setItem("wilaya", value);

    console.log("Wilaya saved:", value);
}

function chooseWilaya() {
    const wilaya = prompt("Enter Wilaya (or leave empty for all):");
    if (wilaya) {
        alert("Selected: " + wilaya);
    } else {
        alert("All Wilayas");
    }
}

function goHome() {
    location.reload();
}

function openCart() {
    alert("Orders waiting confirmation (not implemented yet)");
}

function logout() {
    localStorage.removeItem("token");
    window.location.href = "index.html";
}

/* ✅ LOAD SAVED WILAYA (NO ALERT) */
window.onload = function() {
    const saved = localStorage.getItem("wilaya");

    if (saved !== null) {
        document.getElementById("wilayaSelect").value = saved;
    }
};
</script>
