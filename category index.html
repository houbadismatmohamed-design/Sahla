<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Categories</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ff9800">

<style>
body { margin:0; font-family:Arial; background:#fff; }
.header { display:flex; justify-content:space-between; padding:15px; font-size:20px; font-weight:bold; }
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; padding:15px; }
.card { height:90px; border-radius:12px; display:flex; justify-content:center; align-items:center; color:#fff; font-weight:bold; cursor:pointer; }
.c1{background:#ff9800;} .c2{background:#000;} .c3{background:#f57c00;}
.c4{background:#ffb74d;color:#000;} .c5{background:#212121;}
.c6{background:#ffa726;color:#000;} .c7{background:#fb8c00;}
.c8{background:#424242;} .c9{background:#ffcc80;color:#000;}
.footer { position:fixed; bottom:0; width:100%; display:flex; justify-content:space-around; }
</style>
</head>

<body>

<div class="header">Category</div>

<div class="grid">
<div class="card c1" onclick="selectCategory('drinks')">Drinks</div>
<div class="card c2" onclick="selectCategory('furniture')">Furniture</div>
<div class="card c3" onclick="selectCategory('baby')">Baby & Kids</div>
<div class="card c4" onclick="selectCategory('women')">Women</div>
<div class="card c5" onclick="selectCategory('men')">Men</div>
<div class="card c6" onclick="selectCategory('retail')">Retail</div>
<div class="card c7" onclick="selectCategory('electronic')">Electronic</div>
<div class="card c8" onclick="selectCategory('auto')">Automobile</div>
<div class="card c9" onclick="selectCategory('lifestyle')">Lifestyle</div>
</div>

<div class="footer">
<div onclick="goHome()">🏠</div>
<div onclick="openCart()">🛒</div>
</div>

<script>
function selectCategory(cat){
    localStorage.setItem("category",cat);
    window.location.href="entreprise index.html";
}
function goHome(){location.reload();}
function openCart(){window.location.href="cart_index.html";}
</script>

</body>
</html>
