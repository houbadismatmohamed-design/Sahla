<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Products</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; }
.item { padding:10px; margin:10px; border:1px solid #ddd; display:flex; justify-content:space-between; }
button { background:#ff9800; color:#fff; border:none; padding:5px 10px; }
</style>
</head>

<body>

<h3 id="shopTitle"></h3>

<div id="list">

<div class="item">
    <span>Lait</span>
    <button onclick="addToCart('Lait', 50)">Add</button>
</div>

<div class="item">
    <span>Yaourt</span>
    <button onclick="addToCart('Yaourt', 60)">Add</button>
</div>

<div class="item">
    <span>Fromage</span>
    <button onclick="addToCart('Fromage', 100)">Add</button>
</div>

</div>

<script>

const shop = localStorage.getItem("shop");
document.getElementById("shopTitle").innerText = shop;

/* ADD TO CART */
function addToCart(name, price) {

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.push({
        name: name,
        price: price,
        qty: 1,
        shop: shop
    });

    localStorage.setItem("cart", JSON.stringify(cart));

    alert(name + " added to cart");
}

</script>

</body>
</html>
