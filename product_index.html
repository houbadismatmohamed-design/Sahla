<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Product_index</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ff9800">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
}

/* RIGHT ACTIONS */
.actions {
    display: flex;
    gap: 5px;
}

/* BUTTONS */
.btn {
    padding: 6px 8px;
    border: none;
    background: #ff9800;
    color: white;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
}

/* SEARCH ICON */
.search-icon {
    font-size: 18px;
    cursor: pointer;
}

/* SEARCH INPUT */
.search-box {
    display: none;
    padding: 10px;
}

.search-box input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

/* PRODUCT LIST */
.list {
    padding: 10px;
    padding-bottom: 80px;
}

.item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 10px;
    box-shadow: 0 0 5px rgba(0,0,0,0.1);
}

/* IMAGE */
.img {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    background: #eee;
}

/* TEXT */
.text {
    flex: 1;
}

.title {
    font-weight: bold;
}

.subtitle {
    font-size: 12px;
    color: gray;
}

/* FOOTER */
.footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 60px;
    background: #fff;
    border-top: 1px solid #ddd;
    display: flex;
    justify-content: space-around;
    align-items: center;
}

.nav-btn {
    text-align: center;
    font-size: 14px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <span>Choisire votre produit</span>

    <div class="actions">
        <button class="btn" onclick="filter()">Filtrez</button>
        <button class="btn" onclick="sort()">Triez</button>
        <span class="search-icon" onclick="toggleSearch()">🔍</span>
    </div>
</div>

<!-- SEARCH -->
<div class="search-box" id="searchBox">
    <input type="text" id="searchInput" placeholder="Search product..." onkeyup="searchProduct()">
</div>

<!-- PRODUCT LIST -->
<div class="list" id="productList">

    <div class="item" data-name="sucre">
        <div class="img"></div>
        <div class="text">
            <div class="title">Sucre</div>
            <div class="subtitle">Disponible</div>
        </div>
    </div>

    <div class="item" data-name="sel">
        <div class="img"></div>
        <div class="text">
            <div class="title">Sel</div>
            <div class="subtitle">Disponible</div>
        </div>
    </div>

    <div class="item" data-name="lait">
        <div class="img"></div>
        <div class="text">
            <div class="title">Lait</div>
            <div class="subtitle">Disponible</div>
        </div>
    </div>

    <div class="item" data-name="yaourt">
        <div class="img"></div>
        <div class="text">
            <div class="title">Yaourt</div>
            <div class="subtitle">Disponible</div>
        </div>
    </div>

    <div class="item" data-name="fromage">
        <div class="img"></div>
        <div class="text">
            <div class="title">Fromage</div>
            <div class="subtitle">Disponible</div>
        </div>
    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    <div class="nav-btn" onclick="goHome()">🏠<br>Home</div>
    <div class="nav-btn" onclick="openCart()">🛒<br>Cart</div>
    <div class="nav-btn" onclick="logout()">🚪<br>Logout</div>
</div>

<script>

/* TOGGLE SEARCH */
function toggleSearch() {
    const box = document.getElementById("searchBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

/* LIVE SEARCH (LETTER BY LETTER) */
function searchProduct() {
    const input = document.getElementById("searchInput").value.toLowerCase();
    const items = document.querySelectorAll(".item");

    items.forEach(item => {
        const name = item.getAttribute("data-name");

        if (name.startsWith(input)) {
            item.style.display = "flex";
        } else {
            item.style.display = "none";
        }
    });
}

/* FILTER */
function filter() {
    alert("Filter not implemented yet");
}

/* SORT */
function sort() {
    alert("Sort not implemented yet");
}

function goHome() {
    window.location.href = "Category-index.html";
}

function openCart() {
    alert("Orders waiting confirmation");
}

function logout() {
    localStorage.removeItem("token");
    window.location.href = "index.html";
}
</script>

</body>
</html>
