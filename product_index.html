<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Products</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family:Arial; margin:0; }

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    font-weight:bold;
}

/* BUTTONS */
.top-btn {
    font-size:20px;
    cursor:pointer;
}

/* PRODUCTS */
.item {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    margin:10px;
    border-radius:10px;
    background:#f5f5f5;
}

/* ADD BUTTON */
button {
    background:#ff9800;
    color:#fff;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    font-size:16px;
}
</style>
</head>

<body>

<div class="header">
    <span class="top-btn" onclick="goBack()">⬅</span>
    <span id="shopTitle"></span>
    <span class="top-btn" onclick="logout()">🚪</span>
</div>

<div class="item">Sucre <button onclick="addToCart('Sucre',20)">+</button></div>
<div class="item">Sel <button onclick="addToCart('Sel',10)">+</button></div>
<div class="item">Lait <button onclick="addToCart('Lait',50)">+</button></div>
<div class="item">Yaourt <button onclick="addToCart('Yaourt',60)">+</button></div>
<div class="item">Fromage <button onclick="addToCart('Fromage',100)">+</button></div>

<script>
const shop = localStorage.getItem("shop");
document.getElementById("shopTitle").innerText = shop;

/* ADD TO CART (MERGE) */
function addToCart(name, price){

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let existing = cart.find(p => p.name === name && p.shop === shop);

    if(existing){
        existing.qty += 1;
    } else {
        cart.push({name, price, qty:1, shop});
    }

    localStorage.setItem("cart", JSON.stringify(cart));
}

/* NAV */
function goBack(){ window.location.href="entreprise index.html"; }
function logout(){
    localStorage.removeItem("token");
    window.location.href="index.html";
}
</script>

</body>
</html>
