<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; }

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    padding:15px;
    font-weight:bold;
}

/* ITEM */
.item {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    margin:10px;
    border-radius:10px;
    background:#f5f5f5;
}

/* QTY */
.qty button {
    padding:5px 10px;
    background:#ff9800;
    border:none;
    color:#fff;
    border-radius:5px;
}

/* REMOVE */
.remove {
    color:red;
    cursor:pointer;
}

/* TOTAL */
.total {
    padding:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
    <span onclick="goBack()">⬅</span>
    <span>My Cart</span>
    <span onclick="logout()">🚪</span>
</div>

<div id="cart"></div>

<div class="total" id="total"></div>

<script>

function loadCart(){

    const currentShop = localStorage.getItem("shop");
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let html = "";
    let total = 0;

    cart.forEach((item, index)=>{

        if(item.shop === currentShop){

            total += item.price * item.qty;

            html += `
            <div class="item">
                ${item.name} - ${item.price} DZD

                <div class="qty">
                    <button onclick="changeQty(${index},-1)">-</button>
                    ${item.qty}
                    <button onclick="changeQty(${index},1)">+</button>
                </div>

                <div class="remove" onclick="removeItem(${index})">✕</div>
            </div>`;
        }
    });

    document.getElementById("cart").innerHTML = html;
    document.getElementById("total").innerText = "Total: " + total + " DZD";
}

/* CHANGE QTY */
function changeQty(index, change){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart[index].qty += change;

    if(cart[index].qty <= 0){
        cart.splice(index,1);
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

/* REMOVE */
function removeItem(index){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.splice(index,1);
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

/* NAV */
function goBack(){ window.location.href="product_index.html"; }
function logout(){
    localStorage.removeItem("token");
    window.location.href="index.html";
}

loadCart();

</script>

</body>
</html>
