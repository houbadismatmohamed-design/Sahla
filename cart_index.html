<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cart</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family:Arial; margin:0; }
.item { padding:10px; border-bottom:1px solid #ddd; }
</style>
</head>

<body>

<h2>My Cart</h2>

<div id="cart"></div>

<h3 id="total"></h3>

<script>

const currentShop = localStorage.getItem("shop");
const cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;
let html = "";

cart.forEach(item => {

    if (item.shop === currentShop) {

        total += item.price * item.qty;

        html += `
            <div class="item">
                ${item.name} - ${item.price} DZD x ${item.qty}
            </div>
        `;
    }
});

document.getElementById("cart").innerHTML = html;
document.getElementById("total").innerText = "Total: " + total + " DZD";

</script>

</body>
</html>
